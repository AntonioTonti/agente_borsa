name: Pulisci vecchie workflow runs

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete all workflow runs except latest 5
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepLast = 5; // Mantieni solo le ultime 5 run per workflow
            
            // Ottieni tutti i workflow
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner, repo
            });
            
            for (const workflow of workflows.data.workflows) {
              console.log(`Pulizia workflow: ${workflow.name}`);
              
              // Ottieni le run di questo workflow
              const runs = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: workflow.id,
                per_page: 100
              });
              
              const runsToDelete = runs.data.workflow_runs.slice(keepLast);
              
              for (const run of runsToDelete) {
                console.log(`Eliminazione run #${run.run_number} del ${run.created_at}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner, repo,
                  run_id: run.id
                });
                // Pausa per evitare rate limiting
                await new Promise(r => setTimeout(r, 500));
              }
            }
            
            console.log("Pulizia completata!");
